<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Chat App</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        .header {
            display: flex;
            height: 10%;
            align-items: center;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #dadbd3;
        }

        /* CONTENEDOR PRINCIPAL */

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
        }

        /* PANEL CONTACTOS */

        .contacts-panel {
            width: 20%;
            background: #fff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        /* HEADER CONTACTOS */

        .contacts-header {
            padding: 15px;
            background: #ededed;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }

        /* LISTA CONTACTOS */

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            background: #128c7e;
        }

        .contact {
            padding: 15px;
            border-bottom: 1px solid #f2f2f2;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .contact:hover {
            background: #f5f5f5;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #ccc;
            border-radius: 50%;
        }

        /* PANEL CHAT */

        .chat-panel {
            width: 80%;
            display: flex;
            flex-direction: column;
            background: #002f2d;
        }

        /* HEADER CHAT */

        .chat-header {
            padding: 15px;
            background: #ededed;
            border-bottom: 1px solid #ddd;
        }

        /* MENSAJES */

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* BURBUJAS */

        .message {
            max-width: 50%;
            padding: 10px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .received {
            background: white;
        }

        .sent {
            background: #dcf8c6;
            margin-left: auto;
        }

        /* INPUT */

        .chat-input {
            display: flex;
            padding: 10px;
            background: #f0f0f0;
            border-top: 1px solid #ddd;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            outline: none;
        }

        .chat-input button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            background: #128c7e;
            color: white;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>
            GroupsApp
        </h1>
    </div>


    <div class="container">

        <!-- GRUPOS -->
        <div class="contacts-panel">

            <div class="contacts-header">
                Grupos
            </div>

            <div class="contacts-list">

                <div class="contact">
                    <div class="avatar"></div>
                    <span>Grupo 1</span>
                </div>

                <div class="contact">
                    <div class="avatar"></div>
                    <span>Grupo 2</span>
                </div>

                <div class="contact">
                    <div class="avatar"></div>
                    <span>Grupo 3</span>
                </div>

            </div>

        </div>


        <!-- CHAT -->

        <div class="chat-panel">

            <div class="chat-header">
                Chat
            </div>

            <div class="chat-messages">

                <div class="message received">
                    Hola 👋
                </div>

                <div class="message sent">
                    Hola, ¿cómo estás?
                </div>

            </div>

            <div class="chat-input">

                <input type="text" placeholder="Escribe un mensaje...">

                <button>Enviar</button>

            </div>

        </div>

    </div>

</body>

</html>
